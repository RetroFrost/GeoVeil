name: Source guard

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Run GeoVeil safety guard
        shell: bash
        run: bash scripts/source-guard.sh
