name: Build GeoVeil

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

env:
  NDK_VERSION: 27.2.12479018
  ANDROID_PLATFORM: android-36
  BUILD_TOOLS_VERSION: 36.0.0

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Run source safety guard
        shell: bash
        run: bash scripts/source-guard.sh

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install API 36, NDK, and packaging tools
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager \
            "platforms;${ANDROID_PLATFORM}" \
            "build-tools;${BUILD_TOOLS_VERSION}" \
            "ndk;${NDK_VERSION}" >/dev/null 2>&1
          sudo apt-get update -qq >/dev/null
          sudo apt-get install --yes -qq ninja-build zip >/dev/null

      - name: Build parasitic manager DEX archive
        id: manager_build
        shell: bash
        run: |
          set +e
          bash manager/build-manager.sh >manager-build.log 2>&1
          status=$?
          cat manager-build.log
          if [ "$status" -ne 0 ]; then
            echo "::error::Manager build failed"
            exit "$status"
          fi
          set -euo pipefail
          test -s manager/build/manager.apk
          unzip -l manager/build/manager.apk | tee manager/build/verified-contents.txt
          grep -q 'classes.dex' manager/build/verified-contents.txt

      - name: Report focused manager compiler error
        if: failure() && github.event_name == 'pull_request'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          {
            echo '### RC2 manager compiler output'
            echo
            echo '```text'
            tail -n 120 manager-build.log 2>/dev/null || echo 'manager-build.log was not created'
            echo '```'
          } > manager-build-comment.md
          gh pr comment "$PR_NUMBER" --body-file manager-build-comment.md

      - name: Fetch pinned Zygisk API header
        shell: bash
        run: bash scripts/fetch-zygisk-header.sh

      - name: Compile arm64 Zygisk payload
        shell: bash
        run: |
          set -euo pipefail
          NDK="${ANDROID_HOME}/ndk/${NDK_VERSION}"
          cmake -S native -B build/native -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$NDK/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM="${ANDROID_PLATFORM}" \
            -DANDROID_STL=c++_static \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build/native --parallel 2

      - name: Validate native payload
        shell: bash
        run: |
          set -euo pipefail
          test -s build/native/libgeoveil.so
          file build/native/libgeoveil.so | tee build/native/file.txt
          readelf -h build/native/libgeoveil.so | tee build/native/elf-header.txt
          readelf -Ws build/native/libgeoveil.so | tee build/native/symbols.txt
          grep -q 'zygisk_module_entry' build/native/symbols.txt
          ! grep -E 'getImei|getMeid|getDeviceId|TelephonyManager' build/native/symbols.txt

      - name: Package RC2 development Magisk ZIP
        shell: bash
        run: |
          set -euo pipefail
          rm -rf out
          mkdir -p out/stage/zygisk
          cp -a module/. out/stage/
          cp manager/build/manager.apk out/stage/manager.apk
          cp build/native/libgeoveil.so out/stage/zygisk/arm64-v8a.so
          find out/stage -type d -exec chmod 0755 {} +
          find out/stage -type f -exec chmod 0644 {} +
          chmod 0755 \
            out/stage/customize.sh \
            out/stage/cleanup-legacy.sh \
            out/stage/service.sh \
            out/stage/action.sh
          (
            cd out/stage
            zip -9 -r ../GeoVeil-RC2-development.zip .
          )
          cd out
          sha256sum GeoVeil-RC2-development.zip > SHA256SUMS
          unzip -t GeoVeil-RC2-development.zip
          unzip -l GeoVeil-RC2-development.zip | tee contents.txt
          grep -q 'zygisk/arm64-v8a.so' contents.txt
          grep -q 'manager.apk' contents.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: GeoVeil-RC2-${{ github.sha }}
          path: |
            out/GeoVeil-RC2-development.zip
            out/SHA256SUMS
            out/contents.txt
            manager/build/manager.apk
            manager/build/manager.apk.sha256
            manager/build/manager-contents.txt
            build/native/file.txt
            build/native/elf-header.txt
            build/native/symbols.txt
          if-no-files-found: error
          retention-days: 30
