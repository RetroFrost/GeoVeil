name: Build GeoVeil LSPosed

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  ANDROID_PLATFORM: android-36
  BUILD_TOOLS_VERSION: 36.0.0

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install API 36 and build tools
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platforms;${ANDROID_PLATFORM}" "build-tools;${BUILD_TOOLS_VERSION}" >/dev/null
      - name: Run LSPosed source guard
        run: bash scripts/source-guard.sh
      - name: Restore development APK signing key
        uses: actions/cache@v4
        with:
          path: manager/.signing
          key: geoveil-lsposed-development-apk-signing-v1
      - name: Build signed LSPosed APK
        run: bash manager/build-manager.sh
      - name: Verify LSPosed package metadata
        run: |
          unzip -l manager/build/GeoVeil-LSPosed.apk | grep -q 'META-INF/xposed/java_init.list'
          unzip -p manager/build/GeoVeil-LSPosed.apk META-INF/xposed/java_init.list | grep -q GeoVeilModule
          "${ANDROID_HOME}/build-tools/${BUILD_TOOLS_VERSION}/apksigner" verify --verbose manager/build/GeoVeil-LSPosed.apk
      - uses: actions/upload-artifact@v4
        with:
          name: GeoVeil-LSPosed-${{ github.sha }}
          path: |
            manager/build/GeoVeil-LSPosed.apk
            manager/build/GeoVeil-LSPosed.apk.sha256
            manager/build/badging.txt
            manager/build/certificates.txt
            manager/build/contents.txt
          if-no-files-found: error
          retention-days: 30

