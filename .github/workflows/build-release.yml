name: Build GeoVeil LSPosed release

on:
  workflow_dispatch:
  push:
    tags: ['v*-lsposed.*']

permissions:
  contents: write

env:
  ANDROID_PLATFORM: android-36
  BUILD_TOOLS_VERSION: 36.0.0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: android-actions/setup-android@v3
      - run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platforms;${ANDROID_PLATFORM}" "build-tools;${BUILD_TOOLS_VERSION}" >/dev/null
          bash scripts/source-guard.sh
          bash manager/build-manager.sh
      - uses: actions/upload-artifact@v4
        with:
          name: GeoVeil-LSPosed
          path: manager/build/GeoVeil-LSPosed.apk
