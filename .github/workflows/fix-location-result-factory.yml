name: Apply Android 16 LocationResult factory correction

on:
  push:
    branches: [rc2-full-engine]
    paths:
      - '.github/workflows/fix-location-result-factory.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: rc2-full-engine
          fetch-depth: 0

      - name: Correct factory and remove one-time workflow
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('native/src/main/cpp/engine.cpp')
          source = path.read_text(encoding='utf-8')
          old = 'GetStaticMethodID(result, "create",'
          new = 'GetStaticMethodID(result, "wrap",'
          count = source.count(old)
          if count != 1:
              raise SystemExit(f'expected exactly one obsolete LocationResult factory, found {count}')
          path.write_text(source.replace(old, new), encoding='utf-8')
          PY
          grep -Fq 'GetStaticMethodID(result, "wrap",' native/src/main/cpp/engine.cpp
          ! grep -Fq 'GetStaticMethodID(result, "create",' native/src/main/cpp/engine.cpp
          git rm .github/workflows/fix-location-result-factory.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add native/src/main/cpp/engine.cpp
          git commit -m 'Use the Android 16 LocationResult wrap factory'
          git push origin HEAD:rc2-full-engine
