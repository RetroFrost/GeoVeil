name: Build FakeGPS-derived GeoAvil

on:
  workflow_dispatch:
  push:
    branches: [geoavil-build]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out build host
        uses: actions/checkout@v4

      - name: Unpack actual FakeGPS-derived source
        run: |
          mkdir geoavil
          unzip -q build-inputs/geoavil-root-analog-source.zip -d geoavil

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build inputs
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" >/dev/null

      - name: Build GeoAvil APK
        working-directory: geoavil
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload GeoAvil APK
        uses: actions/upload-artifact@v4
        with:
          name: GeoAvil-FakeGPS-derived
          path: geoavil/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30
