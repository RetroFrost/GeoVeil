name: Build GeoAvil APK

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Checkout patch repo
        uses: actions/checkout@v4

      - name: Prepare FakeGPS source
        run: |
          git clone https://github.com/xiangtailiang/FakeGPS.git geoavil
          git -C geoavil checkout 8502952b815c134be6514d71f0cfb76acd68e7c3
          git -C geoavil apply --binary --verbose ../geoavil.patch

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Build GeoAvil
        working-directory: geoavil
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleDebug --stacktrace --info 2>&1 | tee ../build-output.log

      - name: Publish direct APK file
        if: success()
        run: |
          cp geoavil/app/build/outputs/apk/debug/*.apk GeoAvil-patched-app.apk
          git config user.name "GeoAvil Builder"
          git config user.email "actions@github.com"
          git add GeoAvil-patched-app.apk build-output.log
          git commit -m "Publish patched GeoAvil APK [skip ci]"
          git push

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GeoAvil-build-log
          path: build-output.log
          if-no-files-found: warn
          retention-days: 30

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: GeoAvil-mock-status-tester
          path: GeoAvil-patched-app.apk
          if-no-files-found: error
          retention-days: 30
